<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 116 64" role="img" aria-label="TenJ Lab logo">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d4e82"/>
      <stop offset="1" stop-color="#0c2c4e"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="112" height="60" rx="16" fill="url(#navy)"/>
  <rect x="2.5" y="2.5" width="111" height="59" rx="15.5" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
  <!-- three stars of the Philippine flag -->
  <text x="58" y="19" text-anchor="middle" fill="#ffd24a" font-size="12" letter-spacing="4"
        font-family="Arial, Helvetica, sans-serif">&#9733;&#9733;&#9733;</text>
  <!-- TenJ wordmark -->
  <text x="58" y="49" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-weight="800" font-size="27" letter-spacing="-0.5">
    <tspan fill="#ffffff">Ten</tspan><tspan fill="#ffd24a">J</tspan>
  </text>
</svg>
